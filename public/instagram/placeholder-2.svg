<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0d"/>
      <stop offset="1" stop-color="#0e1512"/>
    </linearGradient>
    <radialGradient id="glowWin2" cx="0.2" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowLoss2" cx="0.85" cy="0.85" r="0.6">
      <stop offset="0" stop-color="#f87171" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#f87171" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#f0c949"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg2)"/>
  <rect width="400" height="500" fill="url(#glowWin2)"/>
  <rect width="400" height="500" fill="url(#glowLoss2)"/>

  <!-- target line (top, green dashed) -->
  <line x1="60" y1="190" x2="340" y2="190" stroke="#34d399" stroke-width="2.5" stroke-dasharray="8 7"/>
  <path d="M300 190 L300 172 M300 172 L292 180 M300 172 L308 180" stroke="#34d399" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="70" y="180" fill="#34d399" font-family="Arial, sans-serif" font-size="14" font-weight="700">Target</text>

  <!-- price zigzag -->
  <polyline points="70,290 120,250 160,275 210,235 250,260 300,230 330,245" fill="none" stroke="url(#gold2)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="70" cy="290" r="5" fill="url(#gold2)"/>
  <circle cx="330" cy="245" r="5" fill="url(#gold2)"/>

  <!-- SL line (bottom, red dashed) -->
  <line x1="60" y1="340" x2="340" y2="340" stroke="#f87171" stroke-width="2.5" stroke-dasharray="8 7"/>
  <path d="M300 340 L300 358 M300 358 L292 350 M300 358 L308 350" stroke="#f87171" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="93" y="360" fill="#f87171" font-family="Arial, sans-serif" font-size="14" font-weight="700">Stop Loss</text>

  <!-- play button -->
  <circle cx="332" cy="418" r="30" fill="#0b0b0d" stroke="url(#gold2)" stroke-width="2"/>
  <path d="M323 403 L323 433 L349 418 Z" fill="url(#gold2)"/>
</svg>
