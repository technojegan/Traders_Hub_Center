<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg4" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b0b0d"/>
      <stop offset="1" stop-color="#17110c"/>
    </linearGradient>
    <radialGradient id="glowGold4" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#f0c949"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg4)"/>
  <rect width="400" height="500" fill="url(#glowGold4)"/>

  <!-- shield -->
  <path d="M200 150 L268 178 L268 250 C268 305 240 340 200 358 C160 340 132 305 132 250 L132 178 Z"
