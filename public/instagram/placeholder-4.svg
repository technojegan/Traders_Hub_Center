  <path d="M172 250 L192 270 L232 222" fill="none" stroke="url(#gold4)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- capital protection label -->
  <text x="200" y="392" text-anchor="middle" fill="#f5f2e8" font-family="Arial, sans-serif" font-size="14" font-weight="700" opacity="0.9">Capital Protection</text>
  <text x="200" y="412" text-anchor="middle" fill="#a3a09a" font-family="Arial, sans-serif" font-size="12">First. Profits come next.</text>

  <!-- play button -->
  <circle cx="332" cy="418" r="30" fill="#0b0b0d" stroke="url(#gold4)" stroke-width="2"/>
  <path d="M323 403 L323 433 L349 418 Z" fill="url(#gold4)"/>
</svg>
