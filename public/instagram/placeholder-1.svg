<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0d"/>
      <stop offset="1" stop-color="#151016"/>
    </linearGradient>
    <radialGradient id="glowCe1" cx="0.15" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#3987e5" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#3987e5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowPe1" cx="0.9" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#d55181" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#d55181" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#f0c949"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg1)"/>
  <rect width="400" height="500" fill="url(#glowCe1)"/>
  <rect width="400" height="500" fill="url(#glowPe1)"/>

  <!-- candlesticks -->
  <g stroke="#3987e5" stroke-width="3">
    <line x1="120" y1="190" x2="120" y2="290"/>
    <line x1="170" y1="230" x2="170" y2="310"/>
  </g>
  <rect x="108" y="210" width="24" height="55" rx="3" fill="#3987e5"/>
  <rect x="158" y="245" width="24" height="40" rx="3" fill="#3987e5"/>

  <g stroke="#d55181" stroke-width="3">
    <line x1="230" y1="220" x2="230" y2="320"/>
    <line x1="280" y1="255" x2="280" y2="345"/>
  </g>
  <rect x="218" y="238" width="24" height="45" rx="3" fill="#d55181"/>
  <rect x="268" y="270" width="24" height="50" rx="3" fill="#d55181"/>

  <!-- entry arrow + tag -->
  <path d="M96 200 L60 200 M60 200 L72 191 M60 200 L72 209" stroke="url(#gold1)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="90" y="182" width="42" height="20" rx="10" fill="none" stroke="url(#gold1)" stroke-width="1.5"/>
  <text x="111" y="196" text-anchor="middle" fill="url(#gold1)" font-family="Arial, sans-serif" font-size="11" font-weight="700">CE</text>

  <rect x="204" y="352" width="42" height="20" rx="10" fill="none" stroke="url(#gold1)" stroke-width="1.5"/>
  <text x="225" y="366" text-anchor="middle" fill="url(#gold1)" font-family="Arial, sans-serif" font-size="11" font-weight="700">PE</text>

  <!-- play button -->
  <circle cx="332" cy="418" r="30" fill="#0b0b0d" stroke="url(#gold1)" stroke-width="2"/>
  <path d="M323 403 L323 433 L349 418 Z" fill="url(#gold1)"/>
</svg>
